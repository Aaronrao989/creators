<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Property Comparison | PropMatch</title>
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --primary: #0f2744;
      --primary-light: #1a3c5e;
      --accent: #e8920a;
      --accent-light: #f5a623;
      --success: #16a34a;
      --danger: #dc2626;
      --warn: #d97706;
      --gray-50: #f8fafc;
      --gray-100: #f1f5f9;
      --gray-200: #e2e8f0;
      --gray-300: #cbd5e1;
      --gray-400: #94a3b8;
      --gray-500: #64748b;
      --gray-700: #334155;
      --gray-900: #0f172a;
      --radius: 14px;
    }

    body {
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      background: var(--gray-50);
      color: var(--gray-900);
      min-height: 100vh;
    }

    /* ── HEADER ─────────────────────────────────── */
    .site-header {
      background: var(--primary);
      padding: 0 2rem;
      height: 60px;
      display: flex;
      align-items: center;
      gap: 0.75rem;
      box-shadow: 0 2px 12px rgba(0,0,0,0.25);
      position: sticky;
      top: 0;
      z-index: 300;
    }
    .logo { font-size: 1.35rem; font-weight: 800; color: #fff; letter-spacing: -0.5px; }
    .logo span { color: var(--accent-light); }
    .header-tag {
      margin-left: auto;
      font-size: 0.75rem;
      color: rgba(255,255,255,0.5);
      font-weight: 500;
    }

    /* ── LISTING PAGE ────────────────────────────── */
    #listing-page { max-width: 1160px; margin: 0 auto; padding: 2.5rem 2rem 8rem; }

    .page-heading { font-size: 1.8rem; font-weight: 800; color: var(--primary); }
    .page-sub { color: var(--gray-500); margin-top: 4px; margin-bottom: 2rem; font-size: 0.9rem; }

    .properties-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 1.5rem;
    }

    /* ── PROPERTY CARD ───────────────────────────── */
    .prop-card {
      background: #fff;
      border-radius: var(--radius);
      overflow: hidden;
      box-shadow: 0 2px 16px rgba(0,0,0,0.07);
      border: 2.5px solid transparent;
      transition: transform 0.22s ease, box-shadow 0.22s ease, border-color 0.18s;
      cursor: pointer;
    }
    .prop-card:hover { transform: translateY(-6px); box-shadow: 0 14px 36px rgba(0,0,0,0.13); }
    .prop-card.selected {
      border-color: var(--accent);
      box-shadow: 0 0 0 4px rgba(232,146,10,0.18), 0 14px 36px rgba(0,0,0,0.13);
    }

    /* card image area */
    .card-img {
      height: 195px;
      position: relative;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }
    .card-img-bg {
      position: absolute;
      inset: 0;
    }
    .card-illo {
      position: relative;
      z-index: 1;
      font-size: 4.5rem;
      filter: drop-shadow(0 6px 12px rgba(0,0,0,0.35));
      line-height: 1;
      user-select: none;
    }
    .card-badge {
      position: absolute;
      bottom: 12px;
      left: 12px;
      z-index: 2;
      background: rgba(0,0,0,0.55);
      backdrop-filter: blur(6px);
      color: #fff;
      font-size: 0.68rem;
      font-weight: 700;
      padding: 4px 10px;
      border-radius: 20px;
      text-transform: uppercase;
      letter-spacing: 0.6px;
    }
    .card-check-label {
      position: absolute;
      top: 12px;
      right: 12px;
      z-index: 2;
      display: flex;
      align-items: center;
      gap: 5px;
      background: rgba(255,255,255,0.92);
      backdrop-filter: blur(6px);
      padding: 5px 10px;
      border-radius: 20px;
      font-size: 0.72rem;
      font-weight: 700;
      color: var(--gray-700);
      cursor: pointer;
      user-select: none;
      box-shadow: 0 2px 8px rgba(0,0,0,0.12);
    }
    .card-check-label input {
      width: 14px;
      height: 14px;
      accent-color: var(--accent);
      cursor: pointer;
    }

    /* card body */
    .card-body { padding: 1.2rem 1.3rem; }
    .card-name { font-size: 1.1rem; font-weight: 800; color: var(--primary); }
    .card-builder { font-size: 0.78rem; color: var(--gray-400); margin-top: 2px; margin-bottom: 0.8rem; }
    .card-price { font-size: 1.25rem; font-weight: 800; color: var(--accent); }
    .card-price-sub { font-size: 0.72rem; color: var(--gray-400); margin-top: 1px; margin-bottom: 0.8rem; }
    .card-divider { border: none; border-top: 1px solid var(--gray-200); margin: 0.6rem 0; }
    .card-location { font-size: 0.8rem; color: var(--gray-500); display: flex; align-items: center; gap: 4px; }

    /* ── COMPARE BAR ─────────────────────────────── */
    #compare-bar {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      background: var(--primary);
      padding: 0.85rem 2rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
      transform: translateY(100%);
      transition: transform 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
      z-index: 200;
      box-shadow: 0 -6px 24px rgba(0,0,0,0.25);
      border-top: 1px solid rgba(255,255,255,0.08);
    }
    #compare-bar.show { transform: translateY(0); }

    .bar-left { display: flex; align-items: center; gap: 1.25rem; }
    .bar-label { color: rgba(255,255,255,0.55); font-size: 0.8rem; white-space: nowrap; }
    .bar-chips { display: flex; gap: 0.5rem; flex-wrap: wrap; }
    .bar-chip {
      background: rgba(255,255,255,0.12);
      color: #fff;
      font-size: 0.78rem;
      font-weight: 600;
      padding: 4px 12px;
      border-radius: 20px;
    }
    .cmp-btn {
      background: linear-gradient(135deg, var(--accent), var(--accent-light));
      color: #fff;
      border: none;
      padding: 0.65rem 1.8rem;
      border-radius: 8px;
      font-size: 0.9rem;
      font-weight: 700;
      cursor: pointer;
      white-space: nowrap;
      transition: opacity 0.2s, transform 0.1s;
      box-shadow: 0 4px 14px rgba(232,146,10,0.4);
    }
    .cmp-btn:hover:not(:disabled) { opacity: 0.9; transform: scale(1.02); }
    .cmp-btn:disabled { opacity: 0.45; cursor: not-allowed; transform: none; }

    /* ── COMPARISON PAGE ─────────────────────────── */
    #comparison-page { display: none; }

    .cmp-hero {
      background: linear-gradient(160deg, var(--primary) 0%, var(--primary-light) 100%);
      color: #fff;
      padding: 1.5rem 2rem 2rem;
    }
    .back-btn {
      background: rgba(255,255,255,0.1);
      border: 1px solid rgba(255,255,255,0.15);
      color: #fff;
      padding: 0.45rem 1.1rem;
      border-radius: 6px;
      font-size: 0.82rem;
      font-weight: 600;
      cursor: pointer;
      margin-bottom: 1.2rem;
      display: inline-flex;
      align-items: center;
      gap: 0.4rem;
      transition: background 0.2s;
    }
    .back-btn:hover { background: rgba(255,255,255,0.2); }
    .cmp-hero-title { font-size: 1.6rem; font-weight: 800; margin-bottom: 1.5rem; }

    /* property header columns */
    .cmp-prop-headers {
      display: grid;
      gap: 1rem;
    }
    .cmp-prop-col {
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 12px;
      padding: 1rem;
      text-align: center;
    }
    .cmp-prop-icon {
      width: 52px;
      height: 52px;
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.6rem;
      margin: 0 auto 0.6rem;
    }
    .cmp-prop-name { font-size: 0.9rem; font-weight: 800; }
    .cmp-prop-builder { font-size: 0.72rem; opacity: 0.6; margin-top: 2px; }

    /* table body */
    .cmp-body { max-width: 1160px; margin: 0 auto; padding: 2rem 2rem 4rem; }

    .cmp-section {
      background: #fff;
      border-radius: var(--radius);
      overflow: hidden;
      box-shadow: 0 2px 14px rgba(0,0,0,0.07);
      margin-bottom: 1.5rem;
    }
    .cmp-section-head {
      background: var(--gray-100);
      border-bottom: 2px solid var(--gray-200);
      padding: 0.85rem 1.5rem;
      font-size: 0.8rem;
      font-weight: 800;
      text-transform: uppercase;
      letter-spacing: 0.7px;
      color: var(--primary);
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }

    .cmp-row {
      display: grid;
      border-bottom: 1px solid var(--gray-100);
    }
    .cmp-row:last-child { border-bottom: none; }

    .cmp-lbl {
      padding: 0.85rem 1.5rem;
      font-size: 0.82rem;
      color: var(--gray-500);
      font-weight: 600;
      background: var(--gray-50);
      display: flex;
      align-items: center;
    }
    .cmp-val {
      padding: 0.85rem 1rem;
      font-size: 0.88rem;
      font-weight: 600;
      color: var(--gray-900);
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      border-left: 1px solid var(--gray-100);
    }
    .cmp-val.best {
      color: var(--success);
      background: rgba(22,163,74,0.05);
    }
    .cmp-val.best::after {
      content: ' ★';
      font-size: 0.7rem;
      opacity: 0.7;
    }

    /* amenity */
    .amen-yes { font-size: 1.1rem; color: var(--success); }
    .amen-no { font-size: 1rem; color: var(--gray-300); }

    /* score row */
    .score-cell {
      padding: 1.2rem 1rem;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 6px;
      border-left: 1px solid var(--gray-100);
    }
    .score-num { font-size: 2.2rem; font-weight: 900; line-height: 1; }
    .score-track {
      width: 100%;
      max-width: 140px;
      height: 8px;
      background: var(--gray-200);
      border-radius: 4px;
      overflow: hidden;
    }
    .score-fill { height: 100%; border-radius: 4px; }
    .score-tag {
      font-size: 0.7rem;
      font-weight: 800;
      padding: 3px 10px;
      border-radius: 20px;
      letter-spacing: 0.3px;
    }

    /* ── RESPONSIVE ──────────────────────────────── */
    @media (max-width: 860px) {
      .properties-grid { grid-template-columns: 1fr 1fr; }
    }
    @media (max-width: 580px) {
      .properties-grid { grid-template-columns: 1fr; }
      .bar-left { flex-direction: column; align-items: flex-start; gap: 0.4rem; }
    }
  </style>
</head>
<body>

<!-- ── SITE HEADER ──────────────────────────────── -->
<header class="site-header">
  <div class="logo">Prop<span>Match</span></div>
  <div class="header-tag">Residential Real Estate · NCR</div>
</header>

<!-- ── LISTING PAGE ─────────────────────────────── -->
<div id="listing-page">
  <h1 class="page-heading">Featured Properties</h1>
  <p class="page-sub">Select up to 3 properties and click <strong>Compare Now</strong> to see a side-by-side analysis.</p>
  <div class="properties-grid" id="properties-grid"></div>
</div>

<!-- ── COMPARISON PAGE ──────────────────────────── -->
<div id="comparison-page"></div>

<!-- ── FLOATING COMPARE BAR ─────────────────────── -->
<div id="compare-bar">
  <div class="bar-left">
    <span class="bar-label">Selected:</span>
    <div class="bar-chips" id="bar-chips"></div>
  </div>
  <button class="cmp-btn" id="cmp-now-btn" onclick="openComparison()">Compare Now →</button>
</div>

<script>
/* ─── DATA ───────────────────────────────────────────── */
const properties = [
  {
    id: 1,
    name: 'ATS Homekraft',
    subtitle: 'Royale Estate',
    builder: 'ATS Homekraft',
    location: 'Sector 10, Noida Extension',
    type: '2 / 3 BHK Apartments',
    price: '₹45 Lakhs',
    priceNum: 45,
    priceSqFt: '₹3,200',
    gradA: '#0f3460', gradB: '#16697a',
    illo: '🏛️',
    badge: 'Ready to Move',
    amenities: { pool: true, gym: true, clubhouse: true, security: true },
    appreciation: '8 – 10% p.a.',  appreciationScore: 9,
    rentalYield: '3.2%',           rentalScore: 3.2,
    score: 85,
  },
  {
    id: 2,
    name: 'Godrej Woods',
    subtitle: 'Sector 43, Noida',
    builder: 'Godrej Properties',
    location: 'Sector 43, Noida',
    type: '2 / 3 / 4 BHK Apartments',
    price: '₹1.2 Crores',
    priceNum: 120,
    priceSqFt: '₹7,800',
    gradA: '#14532d', gradB: '#15803d',
    illo: '🌳',
    badge: 'Under Construction',
    amenities: { pool: true, gym: true, clubhouse: true, security: true },
    appreciation: '10 – 12% p.a.', appreciationScore: 11,
    rentalYield: '3.8%',           rentalScore: 3.8,
    score: 92,
  },
  {
    id: 3,
    name: 'ACE Parkway',
    subtitle: 'Sector 150, Noida',
    builder: 'ACE Group',
    location: 'Sector 150, Noida Extension',
    type: '2 / 3 BHK Apartments',
    price: '₹55 Lakhs',
    priceNum: 55,
    priceSqFt: '₹3,800',
    gradA: '#581c87', gradB: '#7c3aed',
    illo: '🏗️',
    badge: 'New Launch',
    amenities: { pool: true, gym: true, clubhouse: true, security: false },
    appreciation: '6 – 8% p.a.',   appreciationScore: 7,
    rentalYield: '2.9%',           rentalScore: 2.9,
    score: 78,
  },
];

/* ─── STATE ──────────────────────────────────────────── */
let selected = new Set();

/* ─── LISTING ────────────────────────────────────────── */
function renderListings() {
  document.getElementById('properties-grid').innerHTML = properties.map(p => `
    <div class="prop-card ${selected.has(p.id) ? 'selected' : ''}"
         id="card-${p.id}"
         onclick="toggleSelect(${p.id})">

      <!-- image -->
      <div class="card-img">
        <div class="card-img-bg" style="background:linear-gradient(140deg,${p.gradA},${p.gradB})">
          <!-- subtle grid lines -->
          <div style="position:absolute;inset:0;
            background:
              repeating-linear-gradient(0deg,transparent,transparent 28px,rgba(255,255,255,0.04) 28px,rgba(255,255,255,0.04) 29px),
              repeating-linear-gradient(90deg,transparent,transparent 28px,rgba(255,255,255,0.04) 28px,rgba(255,255,255,0.04) 29px)">
          </div>
        </div>
        <div class="card-illo">${p.illo}</div>
        <div class="card-badge">${p.badge}</div>
        <label class="card-check-label" onclick="event.stopPropagation()">
          <input type="checkbox" ${selected.has(p.id) ? 'checked' : ''}
                 onchange="toggleSelect(${p.id})">
          Compare
        </label>
      </div>

      <!-- body -->
      <div class="card-body">
        <div class="card-name">${p.name}</div>
        <div class="card-builder">by ${p.builder}</div>
        <div class="card-price">${p.price} <span style="font-size:0.7rem;font-weight:500;color:var(--gray-400)">onwards</span></div>
        <div class="card-price-sub">${p.priceSqFt} per sq.ft</div>
        <hr class="card-divider">
        <div class="card-location">
          <svg width="12" height="14" viewBox="0 0 12 14" fill="none"><path d="M6 0C3.24 0 1 2.24 1 5c0 3.75 5 9 5 9s5-5.25 5-9c0-2.76-2.24-5-5-5zm0 6.5C5.17 6.5 4.5 5.83 4.5 5S5.17 3.5 6 3.5 7.5 4.17 7.5 5 6.83 6.5 6 6.5z" fill="#94a3b8"/></svg>
          ${p.location}
        </div>
      </div>
    </div>
  `).join('');
}

/* ─── SELECTION ──────────────────────────────────────── */
function toggleSelect(id) {
  if (selected.has(id)) {
    selected.delete(id);
  } else {
    if (selected.size >= 3) {
      showToast('You can compare up to 3 properties at a time.');
      return;
    }
    selected.add(id);
  }
  renderListings();
  updateBar();
}

function updateBar() {
  const bar = document.getElementById('compare-bar');
  const chips = document.getElementById('bar-chips');
  const btn = document.getElementById('cmp-now-btn');
  const count = selected.size;

  if (count === 0) { bar.classList.remove('show'); return; }

  bar.classList.add('show');
  const selProps = properties.filter(p => selected.has(p.id));
  chips.innerHTML = selProps.map(p => `<span class="bar-chip">${p.name}</span>`).join('');

  if (count < 2) {
    btn.disabled = true;
    btn.textContent = `Select ${2 - count} more…`;
  } else {
    btn.disabled = false;
    btn.textContent = 'Compare Now →';
  }
}

/* ─── COMPARISON ─────────────────────────────────────── */
function scoreColor(s) {
  return s >= 90 ? '#16a34a' : s >= 80 ? '#2563eb' : '#d97706';
}
function scoreLabel(s) {
  return s >= 90 ? 'Excellent' : s >= 80 ? 'Good' : 'Fair';
}
function amen(v) {
  return v ? '<span class="amen-yes">✓</span>' : '<span class="amen-no">✗</span>';
}

function openComparison() {
  const sel = properties.filter(p => selected.has(p.id));
  const n = sel.length;

  // Grid: 1 label col + n value cols
  const cols = `180px repeat(${n}, 1fr)`;

  // Best-value helpers
  const lowestPrice = Math.min(...sel.map(p => p.priceNum));
  const highestScore = Math.max(...sel.map(p => p.score));
  const highestYield = Math.max(...sel.map(p => p.rentalScore));
  const highestApp   = Math.max(...sel.map(p => p.appreciationScore));

  function row(label, vals, bestFn) {
    const bestIdx = bestFn ? sel.findIndex(bestFn) : -1;
    return `
      <div class="cmp-row" style="grid-template-columns:${cols}">
        <div class="cmp-lbl">${label}</div>
        ${vals.map((v, i) => `<div class="cmp-val ${i === bestIdx ? 'best' : ''}">${v}</div>`).join('')}
      </div>`;
  }

  function section(title, icon, rows) {
    return `
      <div class="cmp-section">
        <div class="cmp-section-head">${icon}&nbsp; ${title}</div>
        ${rows}
      </div>`;
  }

  // Property header
  const propHeaders = `
    <div class="cmp-prop-headers"
         style="grid-template-columns:${`repeat(${n}, 1fr)`};display:grid;gap:1rem;margin-top:1.5rem">
      ${sel.map(p => `
        <div class="cmp-prop-col">
          <div class="cmp-prop-icon" style="background:linear-gradient(135deg,${p.gradA},${p.gradB})">${p.illo}</div>
          <div class="cmp-prop-name">${p.name}</div>
          <div class="cmp-prop-builder">${p.builder}</div>
        </div>`).join('')}
    </div>`;

  // Sections
  const basicSec = section('Basic Information', '📋', [
    row('Builder',       sel.map(p => p.builder),  null),
    row('Location',      sel.map(p => p.location),  null),
    row('Property Type', sel.map(p => p.type),      null),
  ].join(''));

  const priceSec = section('Pricing Details', '💰', [
    row('Starting Price', sel.map(p => p.price),    p => p.priceNum === lowestPrice),
    row('Price / Sq.Ft',  sel.map(p => p.priceSqFt), null),
  ].join(''));

  const amenSec = section('Amenities', '🏊', [
    row('Swimming Pool', sel.map(p => amen(p.amenities.pool)),      null),
    row('Gymnasium',     sel.map(p => amen(p.amenities.gym)),       null),
    row('Clubhouse',     sel.map(p => amen(p.amenities.clubhouse)), null),
    row('24/7 Security', sel.map(p => amen(p.amenities.security)),  null),
  ].join(''));

  const investSec = section('Investment Analysis', '📈', [
    row('Appreciation Potential', sel.map(p => p.appreciation), p => p.appreciationScore === highestApp),
    row('Rental Yield',           sel.map(p => p.rentalYield),  p => p.rentalScore === highestYield),
  ].join(''));

  const scoreSec = `
    <div class="cmp-section">
      <div class="cmp-section-head">🏆&nbsp; Recommendation Score</div>
      <div class="cmp-row" style="grid-template-columns:${cols}">
        <div class="cmp-lbl">Overall Score</div>
        ${sel.map(p => {
          const c = scoreColor(p.score);
          const isBest = p.score === highestScore;
          return `
            <div class="score-cell" style="${isBest ? 'background:rgba(22,163,74,0.04)' : ''}">
              <div class="score-num" style="color:${c}">${p.score}<span style="font-size:1rem;opacity:0.5">/100</span></div>
              <div class="score-track">
                <div class="score-fill" style="width:${p.score}%;background:${c}"></div>
              </div>
              <div class="score-tag" style="background:${c}18;color:${c}">
                ${isBest ? '★ ' : ''}${scoreLabel(p.score)}
              </div>
            </div>`;
        }).join('')}
      </div>
    </div>`;

  // Build page
  document.getElementById('comparison-page').innerHTML = `
    <div class="cmp-hero">
      <button class="back-btn" onclick="closeComparison()">← Back to Listings</button>
      <div class="cmp-hero-title">Property Comparison</div>
      ${propHeaders}
    </div>
    <div class="cmp-body">
      ${basicSec}
      ${priceSec}
      ${amenSec}
      ${investSec}
      ${scoreSec}
    </div>`;

  document.getElementById('listing-page').style.display = 'none';
  document.getElementById('compare-bar').classList.remove('show');
  document.getElementById('comparison-page').style.display = 'block';
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

function closeComparison() {
  document.getElementById('comparison-page').style.display = 'none';
  document.getElementById('listing-page').style.display = 'block';
  updateBar();
  window.scrollTo({ top: 0 });
}

/* ─── TOAST ──────────────────────────────────────────── */
function showToast(msg) {
  const t = document.createElement('div');
  t.textContent = msg;
  Object.assign(t.style, {
    position: 'fixed', bottom: '90px', left: '50%', transform: 'translateX(-50%)',
    background: '#1e293b', color: '#fff', padding: '10px 20px',
    borderRadius: '8px', fontSize: '0.85rem', fontWeight: '600',
    boxShadow: '0 4px 16px rgba(0,0,0,0.3)', zIndex: '999',
    animation: 'fadeIn 0.2s ease',
  });
  document.body.appendChild(t);
  setTimeout(() => t.remove(), 2800);
}

/* ─── INIT ───────────────────────────────────────────── */
renderListings();
</script>
</body>
