<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 200" fill="none">
  <!-- Badge icon -->
  <!-- Outer scalloped/dashed ring -->
  <circle cx="160" cy="52" r="34" stroke="#1B3480" stroke-width="2.5" stroke-dasharray="5.2 3.4" fill="none"/>
  <!-- Inner ring -->
  <circle cx="160" cy="52" r="27" stroke="#1B3480" stroke-width="1.8" fill="none"/>
  <!-- C letter -->
  <text x="160" y="61" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif" font-size="26" font-weight="700" fill="#1B3480">C</text>

  <!-- CREATORS wordmark -->
  <text x="160" y="118" text-anchor="middle" font-family="'Arial', 'Helvetica Neue', sans-serif" font-size="38" font-weight="800" letter-spacing="6" fill="#1B3480">CREATORS</text>

  <!-- ARENA with flanking rules -->
  <line x1="38" y1="141" x2="118" y2="141" stroke="#1B3480" stroke-width="2"/>
  <text x="160" y="150" text-anchor="middle" font-family="'Arial', 'Helvetica Neue', sans-serif" font-size="16" font-weight="600" letter-spacing="10" fill="#1B3480">ARENA</text>
  <line x1="202" y1="141" x2="282" y2="141" stroke="#1B3480" stroke-width="2"/>
</svg>
